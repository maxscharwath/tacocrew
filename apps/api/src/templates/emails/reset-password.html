<h2
  style="
    color: #f1f5f9;
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 12px;
    letter-spacing: -0.2px;
  "
>
  Reset your password
</h2>

<p
  style="
    color: #94a3b8;
    font-size: 14px;
    line-height: 1.7;
    margin: 0 0 24px;
  "
>
  We received a request to reset your password. Click the button below to
  choose a new one.
</p>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0">
  <tr>
    <td align="center" style="padding-bottom: 24px">
      <a
        href="{{url}}"
        style="
          display: inline-block;
          background: #9e77ed;
          color: #fff;
          font-weight: 600;
          padding: 14px 40px;
          border-radius: 10px;
          text-decoration: none;
          font-size: 14px;
          letter-spacing: 0.2px;
        "
      >
        Reset Password
      </a>
    </td>
  </tr>
</table>

<!-- Divider -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0">
  <tr>
    <td
      style="
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        padding-top: 20px;
      "
    >
      <p
        style="color: #64748b; font-size: 12px; line-height: 1.6; margin: 0"
      >
        This link expires in 1 hour. If you didn't request a password reset,
        you can safely ignore this email &mdash; your account is secure.
      </p>
    </td>
  </tr>
</table>
